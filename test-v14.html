<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Premier League Chrome</title>
<style>
:root{--bg:#07111f;--bg2:#111827;--panel:#0f172a;--line:rgba(255,255,255,.08);--text:#f8fafc;--muted:#94a3b8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#38bdf8}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;color:var(--text);background:linear-gradient(180deg,var(--bg),var(--bg2));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:14px}
.panel,.overlayInner{background:rgba(15,23,42,.97);border:1px solid var(--line);border-radius:20px;box-shadow:0 16px 40px rgba(0,0,0,.28)}
.panel{padding:16px;margin-bottom:16px}.title{font-size:32px;font-weight:900}.sub{color:var(--muted);margin-top:6px;line-height:1.4}.versionBadge{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;background:rgba(56,189,248,.16);color:#bae6fd;font-size:12px;font-weight:900;letter-spacing:.08em}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.stat{background:#08101b;border-radius:14px;padding:10px;text-align:center}.k{font-size:11px;color:var(--muted);text-transform:uppercase}.v{font-size:22px;font-weight:900;margin-top:4px}
.tabs,.chips,.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
button{appearance:none;border:none;border-radius:12px;padding:10px 14px;min-height:44px;font-size:14px;font-weight:800;cursor:pointer}
.chip{background:rgba(255,255,255,.06);color:var(--text)} .chip.active{background:white;color:#0f172a}.primary{background:var(--green);color:white}.info{background:var(--blue);color:#06263b}.warn{background:var(--yellow);color:#1f2937}.danger{background:var(--red);color:white}
.shop{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.product{background:#08101b;border-radius:16px;padding:12px;border:1px solid var(--line);cursor:pointer}.product.sel{outline:2px solid rgba(255,255,255,.75)}.product h4{margin:0 0 6px}.small{font-size:12px;color:var(--muted)}
.message{margin-top:12px;background:rgba(255,255,255,.05);border-radius:14px;padding:12px 14px;min-height:48px}
.stage{display:flex;justify-content:center;align-items:center;min-height:320px;margin-top:12px;position:relative;overflow:hidden}
.pack{width:220px;height:300px;border-radius:24px;background:radial-gradient(circle at 25% 18%, rgba(255,255,255,.24), transparent 28%),linear-gradient(135deg,#1d4ed8,#0ea5e9 45%, #0f172a 100%);box-shadow:0 18px 38px rgba(0,0,0,.34);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:16px;cursor:pointer}
.packTitle{font-size:28px;font-weight:900;line-height:1}.packSub{margin-top:10px;font-size:13px;color:#dbeafe}
.hand{position:relative;width:360px;height:280px;margin:0 auto;pointer-events:none}.stack{position:absolute;width:170px;height:240px;left:50%;top:10px;margin-left:-85px;border-radius:18px;overflow:hidden;box-shadow:0 16px 28px rgba(0,0,0,.34);border:2px solid rgba(255,255,255,.14);background:#0b1220;cursor:pointer;transition:transform .18s ease,left .18s ease,top .18s ease}
.stack:hover{transform:translateY(-2px)}
.back{position:absolute;inset:0;background:radial-gradient(circle at top, rgba(255,255,255,.12), transparent 24%),repeating-linear-gradient(135deg, rgba(255,255,255,.06) 0 8px, rgba(255,255,255,.02) 8px 16px),linear-gradient(180deg,#18263d,#0f172a);display:flex;align-items:center;justify-content:center;flex-direction:column}
.back .logo{font-size:24px;font-weight:900}.back .season{font-size:11px;color:#cbd5e1;margin-top:6px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{position:relative;height:220px;border-radius:18px;overflow:hidden;border:2px solid #334155;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)),linear-gradient(135deg,#111827,#0b1220);box-shadow:0 10px 24px rgba(0,0,0,.25)} .missing{opacity:.45;filter:saturate(.55)}
.base .portrait{position:absolute;inset:42px 12px 46px 12px;border-radius:16px;background:radial-gradient(circle at 35% 28%, rgba(255,255,255,.16), transparent 26%),linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));overflow:hidden}
.future{background:radial-gradient(circle at top left, rgba(59,130,246,.25), transparent 30%),linear-gradient(135deg,#1e3a8a,#0f172a 70%);border-color:#60a5fa}
.phenom{background:linear-gradient(145deg, rgba(255,255,255,.08), transparent 25%),linear-gradient(135deg,#111827,#1f2937 55%, #0b1220);border-color:#94a3b8}
.iconset{background:radial-gradient(circle at center, rgba(250,204,21,.18), transparent 34%),linear-gradient(135deg,#3a2a00,#111827);border-color:#facc15}
.crown{background:radial-gradient(circle at top, rgba(250,204,21,.18), transparent 25%),linear-gradient(135deg,#05080d,#0f172a 45%, #3a2a00)}
.lightning{background:radial-gradient(circle at top left, rgba(59,130,246,.22), transparent 25%),linear-gradient(135deg,#0b1024,#111827 50%, #1d4ed8)}
.theatre{background:radial-gradient(circle at top, rgba(255,255,255,.16), transparent 20%),linear-gradient(180deg,#0f172a,#111827 58%, #12203a)}
.purple{outline:2px solid rgba(168,85,247,.75)} .orange{outline:2px solid rgba(249,115,22,.75)} .gold{outline:2px solid rgba(250,204,21,.75)} .red{outline:2px solid rgba(239,68,68,.8)} .black{outline:2px solid rgba(255,255,255,.7);background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),linear-gradient(135deg,#000,#111827)}.parallelWash{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;opacity:.42}
.purple .parallelWash{background:linear-gradient(135deg, rgba(168,85,247,.55), rgba(168,85,247,.12))}
.orange .parallelWash{background:linear-gradient(135deg, rgba(249,115,22,.58), rgba(249,115,22,.14))}
.gold .parallelWash{background:linear-gradient(135deg, rgba(250,204,21,.6), rgba(250,204,21,.16))}
.red .parallelWash{background:linear-gradient(135deg, rgba(239,68,68,.62), rgba(239,68,68,.16))}
.black .parallelWash{background:linear-gradient(135deg, rgba(255,255,255,.18), rgba(0,0,0,.36)); opacity:.5}
.strip{position:absolute;left:0;top:0;bottom:0;width:12px;opacity:.95}
.head{position:absolute;left:50%;top:18px;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(203,213,225,.8));opacity:.88}
.bodyx{position:absolute;left:50%;top:64px;transform:translateX(-50%);width:110px;height:108px;border-radius:26px 26px 18px 18px;opacity:.9;clip-path:polygon(14% 0,86% 0,100% 26%,82% 100%,18% 100%,0 26%)}
.crest{position:absolute;right:10px;top:10px;width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900}
.tt{position:absolute;left:14px;top:12px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#e2e8f0}.name{position:absolute;left:14px;right:14px;bottom:50px;font-size:19px;font-weight:900;line-height:1.02}.team{position:absolute;left:14px;bottom:30px;font-size:13px;color:#cbd5e1}.serial{position:absolute;left:12px;bottom:8px;font-size:11px;font-weight:900;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.1)}.owned{position:absolute;right:12px;bottom:8px;font-size:12px;font-weight:800;color:#e2e8f0}.value{position:absolute;right:12px;top:46px;font-size:11px;font-weight:800;padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.1)}.sig{position:absolute;right:12px;bottom:70px;font-size:25px;font-family:cursive;transform:rotate(-6deg);color:rgba(255,255,255,.9)}
.overlay{position:fixed;inset:0;background:rgba(2,6,23,.84);display:none;align-items:center;justify-content:center;padding:16px;z-index:50;pointer-events:none}.overlay.show{display:flex;pointer-events:auto}.overlayInner{width:min(100%,980px);padding:16px 16px 80px 16px;max-height:92vh;overflow:auto}.detail{display:grid;grid-template-columns:1fr;gap:14px}.rainbow{display:grid;gap:8px}.ri{display:flex;justify-content:space-between;align-items:center;background:#08101b;padding:10px 12px;border-radius:12px}.divider{height:1px;background:var(--line);margin:12px 0}
@media(min-width:760px){.stats{grid-template-columns:repeat(6,1fr)}.shop{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(4,1fr)}.detail{grid-template-columns:300px 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="title">⚽ Premier League Chrome</div>
    <div class="versionBadge">TEST BUILD V14 · CLEAN STRICT BOXES</div>
    <div class="sub">Rip packs, open boxes, chase rainbows, autos, inserts, and case hits.</div>
    <div class="stats">
      <div class="stat"><div class="k">Money</div><div class="v" id="coins"></div></div>
      <div class="stat"><div class="k">Packs</div><div class="v" id="packs"></div></div>
      <div class="stat"><div class="k">Boxes</div><div class="v" id="boxes"></div></div>
      <div class="stat"><div class="k">Unique</div><div class="v" id="unique"></div></div>
      <div class="stat"><div class="k">Dupes</div><div class="v" id="dupes"></div></div>
      <div class="stat"><div class="k">Big Pulls</div><div class="v" id="bigpulls"></div></div>
    </div>
    <div class="tabs" id="shopTabs"><button class="chip active" data-tab="packs">Packs</button><button class="chip" data-tab="boxes">Boxes</button></div>
    <div class="shop" id="shop"></div>
    <div class="stage" id="stage"></div>
    <div class="controls"><button class="warn" id="openBtn">Open Selected</button><button class="info" id="sellBtn">Quick Sell Dupes</button><button class="chip" id="pullsBtn">Big Pulls</button><button class="danger" id="resetBtn">Reset</button></div>
    <div class="message" id="msg">Choose a pack or box, then open it.</div>
  </div>

  <div class="panel">
    <div class="tabs" id="binderTabs">
      <button class="chip active" data-sec="Base Set">Base Set</button><button class="chip" data-sec="Autographs">Autographs</button>
      <button class="chip" data-sec="Future Stars">Future Stars</button><button class="chip" data-sec="Phenoms">Phenoms</button>
      <button class="chip" data-sec="Club Icons">Club Icons</button><button class="chip" data-sec="Crown Jewels">Crown Jewels</button>
      <button class="chip" data-sec="Midnight Lightning">Midnight Lightning</button><button class="chip" data-sec="Theatre of Greatness">Theatre of Greatness</button>
    </div>
    <div class="chips" id="teamTabs"></div>
    <input id="search" class="chip" style="width:100%;text-align:left;font-weight:600;min-height:46px" placeholder="Search player or team..." />
    <div class="divider"></div>
    <div id="binder" class="grid"></div>
  </div>
</div>

<div class="overlay" id="detailOverlay"><div class="overlayInner">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h3 id="detailTitle" style="margin:0">Player</h3><button class="danger" id="closeDetail">Close</button></div>
  <div class="detail"><div id="detailCard"></div><div><div class="small">Rainbow Progress</div><div id="rainbow" class="rainbow"></div><div class="divider"></div><div id="detailMeta"></div></div></div>
</div></div>

<div class="overlay" id="pullsOverlay"><div class="overlayInner">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h3 style="margin:0">Big Pulls</h3><button class="danger" id="closePulls">Close</button></div>
  <div id="pullsGrid" class="grid"></div>
</div></div>

<script>

let allCards = [], baseCards=[], autoCards=[], futureCards=[], phenomCards=[], iconCards=[], cjCards=[], mlCards=[], tgCards=[];

function findTeam(name){
  for(const [team,names] of Object.entries(DATA.baseTeams)) if(names.includes(name)) return team;
  for(const [team,names] of Object.entries(DATA.autoTeams)) if(names.includes(name)) return team;
  return "Premier League";
}
function makeCards(){
  let n=1;
  Object.entries(DATA.baseTeams).forEach(([team,names])=>names.forEach(name=>{
    let c={id:"B"+n,set:"Base Set",checklist:"#"+n,name,team,color:DATA.clubColors[team]||"#94a3b8"};
    baseCards.push(c); allCards.push(c); n++;
  }));
  let a=1;
  Object.entries(DATA.autoTeams).forEach(([team,names])=>names.forEach(name=>{
    let c={id:"A"+a,set:"Autographs",checklist:"AU-"+a,name,team,color:DATA.clubColors[team]||"#f43f5e"};
    autoCards.push(c); allCards.push(c); a++;
  }));
  DATA.futureStars.forEach((name,i)=>{let c={id:"FS"+(i+1),set:"Future Stars",checklist:"FS-"+(i+1),name,team:findTeam(name),color:"#3b82f6"}; futureCards.push(c); allCards.push(c);});

makeCards();

function rand(a){ return a[Math.floor(Math.random()*a.length)]; }
function chance(p){ return Math.random()<p; }
function featuredMult(name){ return DATA.featuredMult[name] || 1; }
function key(card){ return `${card.set}|${card.id}|${card.variant||"Base"}`; }
function own(card){ return state.collection[key(card)] || 0; }
function uniqueCount(){ return Object.values(state.collection).filter(v=>v>0).length; }
function dupeCount(){ let d=0; Object.values(state.collection).forEach(v=>{ if(v>1) d+=v-1; }); return d; }
function parseKey(k){ const [set,id,variant]=k.split("|"); const c=allCards.find(x=>x.set===set && x.id===id); if(!c) return null; return Object.assign({},c, variant==="Base"?{}:{variant}); }
function cardValue(card){
  let v=0;
  if(["Crown Jewels","Midnight Lightning","Theatre of Greatness"].includes(card.set) && card.variant==="Red /5") v=valueMap.CaseRed;
  else if(["Crown Jewels","Midnight Lightning","Theatre of Greatness"].includes(card.set) && card.variant==="Black 1/1") v=valueMap.CaseBlack;
  else if(card.variant && valueMap[card.variant]) v=valueMap[card.variant];
  else v=valueMap[card.set] || 3;
  return Math.round(v * featuredMult(card.name));
}
function isBig(card){ return card.set==="Autographs" || ["Crown Jewels","Midnight Lightning","Theatre of Greatness"].includes(card.set) || ["Gold /10","Red /5","Black 1/1"].includes(card.variant); }
function addCard(card){ const k=key(card); state.collection[k]=(state.collection[k]||0)+1; if(isBig(card)){ state.bigPulls.unshift(Object.assign({stamp:Date.now()},card)); state.bigPulls=state.bigPulls.slice(0,24); } }
function clone(c){ return JSON.parse(JSON.stringify(c)); }
function weightedParallel(){ const r=Math.random(); if(r<0.70) return "Purple /50"; if(r<0.90) return "Orange /25"; if(r<0.97) return "Gold /10"; if(r<0.995) return "Red /5"; return "Black 1/1"; }
function lowParallel(){ const r=Math.random(); if(r<0.72) return "Orange /25"; if(r<0.92) return "Gold /10"; if(r<0.992) return "Red /5"; return "Black 1/1"; }
function basePick(){ return clone(rand(baseCards)); }
function autoPick(){ return clone(rand(autoCards)); }
function insertPick(){ return clone(rand(rand([futureCards,phenomCards,iconCards]))); }
function casePick(){ return clone(rand(rand([cjCards,mlCards,tgCards]))); }
function applyParallel(card, forced){ card.variant = forced || weightedParallel(); card.serial = generateSerial(card.variant); return card; }

function rollPack(pk, mode="loose"){
  const p = DATA.products[pk];
  const cards = [];
  for(let i=0;i<p.cards;i++) cards.push(basePick());

  if(mode==="box"){
    // In box mode we DO NOT roll base numbered parallels here.
    // Only inserts/autos/case hits can occur as extras.
    if((pk==="valuePack" && chance(1/40)) || (pk==="hobbyPack" && chance(1/18)) || (pk==="megaPack" && chance(1/12))){
      let idx=Math.floor(Math.random()*cards.length); 
      cards[idx]=insertPick();
    }

    if((pk==="valuePack" && chance(1/250)) || (pk==="hobbyPack" && chance(1/120)) || (pk==="megaPack" && chance(1/55))){
      let idx=Math.floor(Math.random()*cards.length); 
      cards[idx]=autoPick();
    }

    if((pk==="valuePack" && chance(1/1000)) || (pk==="hobbyPack" && chance(1/650)) || (pk==="megaPack" && chance(1/350))){
      let idx=Math.floor(Math.random()*cards.length); 
      let c=casePick();
      if(chance(0.015)){ c.variant="Red /5"; c.serial=generateSerial(c.variant); }
      if(chance(0.002)){ c.variant="Black 1/1"; c.serial=generateSerial(c.variant); }
      cards[idx]=c;
    }

    return cards;
  }

  // loose pack behaviour (unchanged)
  let hot = chance(0.007);
  let parallelAdds = pk==="megaPack" ? (chance(0.22)?2:(chance(0.55)?1:0)) : pk==="hobbyPack" ? (chance(0.62)?1:0) : (chance(0.16)?1:0);
  for(let i=0;i<parallelAdds;i++){ let idx=Math.floor(Math.random()*cards.length); cards[idx]=applyParallel(basePick()); }

  if((pk==="valuePack" && chance(1/22)) || (pk==="hobbyPack" && chance(1/9)) || (pk==="megaPack" && chance(1/6))){
    let idx=Math.floor(Math.random()*cards.length); cards[idx]=insertPick();
  }

  if((pk==="valuePack" && chance(1/180)) || (pk==="hobbyPack" && chance(1/65)) || (pk==="megaPack" && chance(1/28))){
    let idx=Math.floor(Math.random()*cards.length); cards[idx]=autoPick();
  }

  if((pk==="valuePack" && chance(1/700)) || (pk==="hobbyPack" && chance(1/420)) || (pk==="megaPack" && chance(1/220))){
    let idx=Math.floor(Math.random()*cards.length); 
    let c=casePick(); 
    if(chance(0.015)){ c.variant="Red /5"; c.serial=generateSerial(c.variant); } 
    if(chance(0.002)){ c.variant="Black 1/1"; c.serial=generateSerial(c.variant); } 
    cards[idx]=c; 
  }

  if(hot){
    let idx=Math.floor(Math.random()*cards.length); 
    cards[idx] = chance(0.7) ? applyParallel(basePick()) : insertPick();
  }

  const hi = cards.findIndex(c=>c.set!=="Base Set" || c.variant);
  if(hi>=0){ let temp=cards[cards.length-1]; cards[cards.length-1]=cards[hi]; cards[hi]=temp; }

  return cards;
}

function buildBox(pk){
  const b = DATA.products[pk];
  const packs = [];
  for(let i=0;i<b.packs;i++) packs.push(rollPack(b.packType,"box"));
  function count(fn){ return packs.flat().filter(fn).length; }
  function inject(makeFn){
    // Prefer replacing a plain base card in the box so guarantees add the minimum hits cleanly.
    let choices = [];
    packs.forEach((pack, pi) => {
      pack.forEach((card, ci) => {
        if(card.set==="Base Set" && !card.variant) choices.push([pi, ci]);
      });
    });
    let target;
    if(choices.length){
      target = choices[Math.floor(Math.random()*choices.length)];
    } else {
      const pi=Math.floor(Math.random()*packs.length);
      const ci=Math.floor(Math.random()*packs[pi].length);
      target = [pi, ci];
    }
    const [pi, ci] = target;
    packs[pi][ci] = makeFn();
  }
  if(pk==="valueBox"){ inject(()=>applyParallel(basePick())); }
  if(pk==="hobbyBox"){ inject(()=>autoPick()); for(let i=0;i<3;i++) inject(()=>applyParallel(basePick())); inject(()=>insertPick()); }
  if(pk==="megaBox"){ for(let i=0;i<2;i++) inject(()=>autoPick()); for(let i=0;i<6;i++) inject(()=>applyParallel(basePick(), lowParallel())); for(let i=0;i<2;i++) inject(()=>insertPick()); }
  return packs;
}

function cls(card){
  let out = "card ";
  if(card.set==="Base Set" || card.set==="Autographs") out += "base ";
  if(card.set==="Future Stars") out += "future ";
  if(card.set==="Phenoms") out += "phenom ";
  if(card.set==="Club Icons") out += "iconset ";
  if(card.set==="Crown Jewels") out += "crown ";
  if(card.set==="Midnight Lightning") out += "lightning ";
  if(card.set==="Theatre of Greatness") out += "theatre ";
  if(card.variant==="Purple /50") out += "purple ";
  if(card.variant==="Orange /25") out += "orange ";
  if(card.variant==="Gold /10") out += "gold ";
  if(card.variant==="Red /5") out += "red ";
  if(card.variant==="Black 1/1") out += "black ";
  return out;
}
function serialText(card){ if(card.serial) return card.serial; if(card.variant==="Black 1/1") return "1/1"; if(card.variant) return card.variant; return card.checklist; }
function renderCard(card, missing=false, count=0){
  const d=document.createElement("div"); d.className = cls(card) + (missing?" missing":"");
  d.innerHTML = `<div class="strip" style="background:${card.color||"#94a3b8"}"></div>
  <div class="portrait"><div class="head"></div><div class="bodyx" style="background:linear-gradient(180deg,${card.color||"#94a3b8"},rgba(255,255,255,.78))"></div></div>
  <div class="parallelWash"></div><div class="crest">${(card.team||"?")[0]}</div><div class="tt">${card.set}</div><div class="value">£ ${cardValue(card)}</div>
  ${card.set==="Autographs" ? `<div class="sig">${card.name.split(" ")[0]}</div>` : ""}
  <div class="name">${card.name}</div><div class="team">${card.team}</div><div class="serial">${serialText(card)}</div><div class="owned">${missing?"Missing":(count?"x"+count:"")}</div>`;
  return d;
}

function renderShop(){
  const root=$("shop"); root.innerHTML="";
  const keys = state.selectedTab==="packs" ? ["valuePack","hobbyPack","megaPack"] : ["valueBox","hobbyBox","megaBox"];
  keys.forEach(k=>{ const p=DATA.products[k]; const d=document.createElement("div"); d.className="product"+(state.selectedProduct===k?" sel":"");
    let extra = p.type==="pack" ? `${p.cards} cards` : `${p.packs} packs`;
    let guar = "";
    if(k==="valueBox") guar = "at least 1 parallel";
    if(k==="hobbyBox") guar = "at least 1 auto, 3 parallels, 1 insert";
    if(k==="megaBox") guar = "at least 2 autos, 6 parallels /25 or lower, 2 inserts";
    d.innerHTML=`<h4>${p.label}</h4><div class="small">${extra}<br>£${p.cost}${guar?`<br>Guarantees: ${guar}`:""}</div>`;
    d.onclick=()=>{state.selectedProduct=k; renderShop(); renderStage(); save();}; root.appendChild(d); });
}
function setMsg(t){ $("msg").textContent=t; }

function renderStage(){
  const stage=$("stage"); stage.innerHTML="";
  if(state.hand.length){
    const hand=document.createElement("div"); hand.className="hand";

    // Revealed/flew-away cards stacked to left
    state.revealedCards.forEach((card, i)=>{
      const s=document.createElement("div");
      s.className="stack";
      s.style.left=`calc(50% - ${120 - i*12}px)`;
      s.style.top=`${24 + i*2}px`;
      s.style.transform=`rotate(${-18 + i*2}deg) scale(.88)`;
      s.style.zIndex=String(10 + i);
      s.style.pointerEvents="none";

      const f=document.createElement("div");
      f.style.position="absolute";
      f.style.inset="0";
      f.appendChild(renderCard(card,false,own(card)));
      s.appendChild(f);
      hand.appendChild(s);
    });

    // Current card: if not revealed yet, show back on top. If revealed, show front on top.
    const current = state.hand[state.handIndex];
    if(current){
      const currentCard=document.createElement("div");
      currentCard.className="stack";
      currentCard.style.left="50%";
      currentCard.style.top="0px";
      currentCard.style.transform="translateX(-50%) rotate(-2deg)";
      currentCard.style.zIndex="999";

      if(!current._revealed){
        currentCard.innerHTML=`<div class="back"><div class="logo">PREMIER LEAGUE</div><div class="season">Chrome 2025–26</div></div>`;
      } else {
        const f=document.createElement("div");
        f.style.position="absolute";
        f.style.inset="0";
        f.appendChild(renderCard(current,false,own(current)));
        currentCard.appendChild(f);
      }
      currentCard.style.pointerEvents = "auto";
        currentCard.onclick = revealNext;
      hand.appendChild(currentCard);
    }

    // Remaining unrevealed cards behind current
    const trailing = state.hand.slice(state.handIndex + 1);
    trailing.forEach((card, relIdx)=>{
      const s=document.createElement("div");
      s.className="stack";
      const offset = relIdx * 16;
      s.style.left=`calc(50% + ${24 + offset}px)`;
      s.style.top=`${8 + relIdx*2}px`;
      s.style.transform=`translateX(-50%) rotate(${3 + relIdx*3}deg) scale(.96)`;
      s.style.zIndex=String(200 - relIdx);
      s.style.pointerEvents="none";
      s.style.opacity=".9";
      s.innerHTML=`<div class="back"><div class="logo">PREMIER LEAGUE</div><div class="season">Chrome 2025–26</div></div>`;
      hand.appendChild(s);
    });

    stage.appendChild(hand);
  } else {
    const p=DATA.products[state.selectedProduct];
    const pack=document.createElement("div"); pack.className="pack";
    pack.innerHTML=`<div class="packTitle">${p.label}</div><div class="packSub">${p.type==="pack"?`${p.cards} cards`:`${p.packs} packs`} · £${p.cost}</div>`;
    pack.style.pointerEvents = "auto";
    pack.onclick=openSelected; stage.appendChild(pack);
  }
}
function openSelected(){
  const p=DATA.products[state.selectedProduct];
  if(state.coins < p.cost) return setMsg("Not enough for that product.");
  state.coins -= p.cost;
  if(p.type==="pack"){ state.queue=[rollPack(state.selectedProduct)]; }
  else { state.queue=buildBox(state.selectedProduct); state.boxesOpened += 1; }
  startQueue(); save(); renderAll();
}
function startQueue(){
  if(!state.queue.length){ state.hand=[]; state.handIndex=0; state.revealedCards=[]; renderAll(); return; }
  state.hand=state.queue.shift();
  state.hand.forEach(c=>{ delete c._revealed; });
  state.handIndex=0;
  state.revealedCards=[];
  state.packsOpened += 1;
}
function showPackSummary(cards){
  const grid = $("summaryGrid");
  grid.innerHTML = "";
  cards.forEach(card => grid.appendChild(renderCard(card,false,own(card))));
  $("summaryOverlay").classList.add("show");
}

function revealNext(){
  if(state.handIndex >= state.hand.length) return;
  const current = state.hand[state.handIndex];
  if(!current._revealed){
    addCard(current);
    current._revealed = true;
    setMsg("Tap the revealed card again to move it away.");
    renderAll();
    save();
    return;
  }

  // second tap: move revealed card to left pile, advance to next card
  state.revealedCards.push(current);
  state.handIndex += 1;

  if(state.handIndex >= state.hand.length){
    const completedPack = state.revealedCards.slice();
    state.hand = [];
    state.handIndex = 0;
    state.revealedCards = [];
    showPackSummary(completedPack);

    if(state.queue.length){
      setMsg(`Pack complete. Close summary for next pack. ${state.queue.length} pack(s) left in box.`);
    } else {
      setMsg("Pack complete. Close summary to continue.");
      checkRewards();
    }
    renderAll();
    save();
  } else {
    setMsg("Tap the next card to reveal it.");
    renderAll();
    save();
  }
}
function checkRewards(){
  Object.entries(DATA.baseTeams).forEach(([team,names])=>{
    const rewardKey = "reward|"+team;
    if(state.collection[rewardKey]) return;
    const done = names.every(name=>{ const c=baseCards.find(x=>x.name===name); return c && own(c)>0; });
    if(done){ state.collection[rewardKey]=1; state.coins += 35; setMsg(`Completed ${team}. Reward: £35.`); }
  });
}

function renderBinder(){
  const root=$("binder"); root.innerHTML="";
  let cards=[];
  if(state.section==="Base Set") cards=baseCards;
  if(state.section==="Autographs") cards=autoCards;
  if(state.section==="Future Stars") cards=futureCards;
  if(state.section==="Phenoms") cards=phenomCards;
  if(state.section==="Club Icons") cards=iconCards;
  if(state.section==="Crown Jewels") cards=cjCards;
  if(state.section==="Midnight Lightning") cards=mlCards;
  if(state.section==="Theatre of Greatness") cards=tgCards;
  cards = cards.filter(c=> (state.team==="All" || c.team===state.team) && (!state.search || (`${c.name} ${c.team}`.toLowerCase().includes(state.search.toLowerCase()))));
  cards.forEach(c=>{ const cnt=own(c); const el=renderCard(c,cnt===0,cnt); el.onclick=()=>openDetail(c); root.appendChild(el); });
  renderTeamTabs();
}
function renderTeamTabs(){
  const root=$("teamTabs"); root.innerHTML="";
  if(state.section!=="Base Set") return;
  const teams=["All", ...Object.keys(DATA.baseTeams)];
  teams.forEach(t=>{ const b=document.createElement("button"); b.className="chip"+(state.team===t?" active":""); b.textContent=t==="All"?"All Teams":t; b.onclick=()=>{state.team=t; renderBinder(); save();}; root.appendChild(b); });
}
function openDetail(card){
  $("detailTitle").textContent = card.name;
  $("detailCard").innerHTML = "";
  $("detailCard").appendChild(renderCard(card,false,own(card)));
  const rb=$("rainbow"); rb.innerHTML="";
  [{label:"Base",card:card}, ...serials.map(v=>({label:v, card:Object.assign({},card,{variant:v})}))].forEach(x=>{ const owned = own(x.card)>0; const div=document.createElement("div"); div.className="ri"; div.innerHTML=`<span>${x.label}</span><strong>${owned?"✓":"✗"}</strong>`; rb.appendChild(div); });
  const meta=$("detailMeta");
  const autoOwned = autoCards.some(c=>c.name===card.name && own(c)>0);
  const insertOwned = [futureCards,phenomCards,iconCards,cjCards,mlCards,tgCards].flat().some(c=>c.name===card.name && own(c)>0);
  const ownedCount = own(card);
  meta.innerHTML = `<div class="small">Checklist</div><div>${card.checklist}</div><div class="divider"></div><div>Autograph: <strong>${autoOwned?"Owned":"Missing"}</strong></div><div>Other inserts: <strong>${insertOwned?"Owned":"Missing"}</strong></div><div class="divider"></div><div class="controls" style="margin-top:6px;margin-bottom:12px"><button class="warn" id="sellOneBtn" type="button">Sell 1</button><button class="chip" id="keepBtn" type="button">Keep</button></div><div>Sell value: <strong>£${cardValue(card)}</strong></div><div>Owned: <strong>${ownedCount}</strong></div>`;
  $("detailOverlay").classList.add("show");

  const sellBtn = $("sellOneBtn");
  const keepBtn = $("keepBtn");
  if(sellBtn){
    if(ownedCount < 1){
      sellBtn.disabled = true;
      sellBtn.style.opacity = ".5";
    } else {
      sellBtn.onclick = () => {
        const k = key(card);
        if((state.collection[k] || 0) > 0){
          state.collection[k] -= 1;
          if(state.collection[k] <= 0) delete state.collection[k];
          state.coins += cardValue(card);
          $("detailOverlay").classList.remove("show");
          setMsg(`Sold ${card.name} for £${cardValue(card)}.`);
          renderAll();
          save();
        }
      };
    }
  }
  if(keepBtn){
    keepBtn.onclick = () => $("detailOverlay").classList.remove("show");
  }
}
function renderPulls(){
  $("bigpulls").textContent = state.bigPulls.length;
  const grid=$("pullsGrid"); grid.innerHTML="";
  if(!state.bigPulls.length){ grid.innerHTML = `<div class="small">No big pulls yet.</div>`; return; }
  state.bigPulls.forEach(c=>grid.appendChild(renderCard(c,false,1)));
}

function quickSell(){
  let gained=0;
  Object.keys(state.collection).forEach(k=>{ if(k.startsWith("reward|")) return; let extra=Math.max(0,state.collection[k]-1); if(extra<=0) return; let c=parseKey(k); if(c) gained += extra * cardValue(c); state.collection[k]=1; });
  if(!gained) return setMsg("No duplicates to sell.");
  state.coins += gained; setMsg(`Quick sold duplicates for £${gained}.`); renderAll(); save();
}

function renderStats(){
  $("coins").textContent="£" + state.coins; $("packs").textContent=state.packsOpened; $("boxes").textContent=state.boxesOpened; $("unique").textContent=uniqueCount(); $("dupes").textContent=dupeCount();
}
function renderAll(){
  renderStats(); renderShop(); renderStage(); renderBinder(); renderPulls();
  document.querySelectorAll("#shopTabs .chip").forEach(b=>b.classList.toggle("active", b.dataset.tab===state.selectedTab));
  document.querySelectorAll("#binderTabs .chip").forEach(b=>b.classList.toggle("active", b.dataset.sec===state.section));
}

function bind(){
  $("openBtn").onclick=openSelected; $("sellBtn").onclick=quickSell; $("pullsBtn").onclick=()=>$("pullsOverlay").classList.add("show");
  $("closePulls").onclick=()=>$("pullsOverlay").classList.remove("show"); $("closeDetail").onclick=()=>$("detailOverlay").classList.remove("show");
  $("detailOverlay").onclick=e=>{ if(e.target===$("detailOverlay")) $("detailOverlay").classList.remove("show"); };
  $("pullsOverlay").onclick=e=>{ if(e.target===$("pullsOverlay")) $("pullsOverlay").classList.remove("show"); };
  $("resetBtn").onclick=()=>{ localStorage.removeItem(SAVE_KEY); location.reload(); };
  $("closeSummary").onclick=()=>{
    $("summaryOverlay").classList.remove("show");
    if(!state.hand.length && state.queue.length){
      setMsg(`Next pack ready. ${state.queue.length} pack(s) left in box.`);
      startQueue();
      renderAll();
      save();
    } else {
      renderAll();
    }
  };
  $("summaryOverlay").onclick=e=>{ if(e.target===$("summaryOverlay")) $("closeSummary").click(); };
  $("search").addEventListener("input", e=>{ state.search=e.target.value||""; renderBinder(); save(); });
  document.querySelectorAll("#shopTabs .chip").forEach(b=>b.onclick=()=>{ state.selectedTab=b.dataset.tab; state.selectedProduct=state.selectedTab==="packs"?"valuePack":"valueBox"; renderAll(); save(); });
  document.querySelectorAll("#binderTabs .chip").forEach(b=>b.onclick=()=>{ state.section=b.dataset.sec; state.team="All"; renderAll(); save(); });
}

window.addEventListener("load", ()=>{ load(); bind(); renderAll(); });
</script>

<div class="overlay" id="summaryOverlay"><div class="overlayInner">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h3 style="margin:0">Pack Summary</h3><button class="danger" id="closeSummary">Close</button></div>
  <div id="summaryGrid" class="grid"></div>
</div></div>

</body>
